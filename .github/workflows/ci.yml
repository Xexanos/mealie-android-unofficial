name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew assembleDebug

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew test

  lint:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew ktlintCheck detekt lint

  e2e:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        api-level: [30, 34, 35]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Accept SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
      - name: Run WireMock E2E tests
        run: ./gradlew mediumPhoneApi${{ matrix.api-level }}DebugAndroidTest
      - name: Health check - demo.mealie.io
        id: live-health
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://demo.mealie.io/api/app/about)
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::warning::demo.mealie.io unreachable (HTTP $HTTP_STATUS) - skipping live E2E tests"
            echo "reachable=false" >> "$GITHUB_OUTPUT"
          else
            echo "reachable=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Run Live E2E tests
        if: steps.live-health.outputs.reachable == 'true'
        run: >-
          ./gradlew mediumPhoneApi${{ matrix.api-level }}DebugAndroidTest
          "-Pandroid.testInstrumentationRunnerArguments.package=dev.xexanos.mealie.e2e"
          "-Pandroid.testInstrumentationRunnerArguments.e2eBackend=live"
