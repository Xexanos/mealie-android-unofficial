[workflow]

on_complete = """
BMAD Status to GitHub Projects Status Mapping:
- ready-for-dev -> Todo
- in-progress -> In Progress
- review -> In Review
- done -> Done

1. Find the existing GitHub issue in Xexanos/mealie-android-unofficial for this story using
   mcp__github__search_issues with the story title as the query. If found, update it using
   mcp__github__issue_write (method 'update') with the full acceptance criteria from the story
   file as the new body. If not found, create a new issue using mcp__github__issue_write
   (method 'create') with the story title and the full acceptance criteria as the body.
   Note the issue URL for use in step 4.

2. Determine the epic number from the story ID (e.g. story "1-3-..." belongs to epic 1).
   Find the matching GitHub Project number via Bash:
   `gh project list --owner Xexanos --format json`
   Match by the epic's title (read from epics.md if needed).

3. Get the project's node ID and Status field details via Bash:
   `gh project field-list <project-number> --owner Xexanos --format json`
   Extract: the Status field node ID (PVTSSF_...), and extract all option IDs:
   - "Todo" option ID (maps to BMAD "ready-for-dev")
   - "In Progress" option ID (maps to BMAD "in-progress")
   - "In Review" option ID (maps to BMAD "review")
   - "Done" option ID (maps to BMAD "done")

4. Find the story's item node ID in the project via Bash:
   `gh project item-list <project-number> --owner Xexanos --format json`
   Match the item by the issue URL or title from step 1.
   Also extract the project node ID from this output.

5. Set the initial status to "Todo" (BMAD "ready-for-dev" state) via Bash:
   `gh project item-edit --id <item-node-id> --field-id <status-field-node-id> --project-id <project-node-id> --single-select-value <todo-option-id>`

6. Derive the story branch name from the story key (the story file name without .md,
   e.g. "1-2-login-screen"). Create and push the branch from main via Bash:
   `git checkout -b {story-key} main && git push -u origin {story-key}`
   Skip silently if the branch already exists.

7. On the story branch, stage and commit the story file and the updated sprint-status.yaml,
   then push via Bash:
   `git add _bmad-output/implementation-artifacts/{story-key}.md _bmad-output/implementation-artifacts/sprint-status.yaml && git commit -m "Add story {story-key} and mark ready-for-dev in sprint status" && git push`

If any step fails, report what was updated and what remains so the user can complete it manually.
"""
